<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Details | WorkBee</title>

    <link rel="stylesheet" href="Css folder/project-details.css">

</head>

<body>

<div class="container">

    <!-- Project Header -->

    <div class="project-header">

        <div>

            <h1 id="projectTitle">

                Loading Project...

            </h1>

            <p id="projectCategory">

                Category

            </p>

        </div>

        <div class="budget-box">

            <h2 id="projectBudget">

                $0

            </h2>

            <span>Project Budget</span>

        </div>

    </div>

    <!-- Main Content -->

    <div class="content">

        <!-- Left -->

        <div class="left">

            <div class="card">

                <h2>Description</h2>

                <p id="projectDescription">

                    Loading...

                </p>

            </div>

            <div class="card">

                <h2>Required Skills</h2>

                <div id="skillsContainer">

                </div>

            </div>

            <div class="card">

                <h2>Attachments</h2>

                <div id="attachments">

                    No files uploaded.

                </div>

            </div>

        </div>

        <!-- Right -->

        <div class="right">

            <div class="card">

                <h2>Client Information</h2>

                <h3 id="clientName">

                    Client Name

                </h3>

                <p id="clientCountry">

                    Country

                </p>

                <p>

                    ⭐ <span id="clientRating">0.0</span>

                </p>

            </div>

            <div class="card">

                <h2>Project Info</h2>

                <p>

                    Deadline:
                    <strong id="projectDeadline">

                        --

                    </strong>

                </p>

                <p>

                    Experience:
                    <strong id="projectExperience">

                        Intermediate

                    </strong>

                </p>

                <p>

                    Status:
                    <strong id="projectStatus">

                        Open

                    </strong>

                </p>

            </div>

            <div class="actions">

                <button id="applyBtn">

                    💼 Apply Now

                </button>

                <button id="chatBtn">

                    💬 Chat Client

                </button>

                <button id="saveBtn">

                    ❤️ Save

                </button>

                <button id="shareBtn">

                    🔗 Share

                </button>

            </div>

        </div>

    </div>

</div>

<script type="module" src="Js folder/project-details.js"></script>

</body>

</html>
