<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Posted Jobs | WorkBee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f5f7;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .logo-area {
            font-size: 22px;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-links li a {
            color: #bbb;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 6px;
            display: block;
            transition: 0.3s;
        }

        .nav-links li a:hover, .nav-links li a.active {
            background-color: #f39c12;
            color: #000;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-title {
            font-size: 26px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .job-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .job-info p {
            color: #666;
            font-size: 14px;
        }

        .job-budget {
            font-size: 16px;
            font-weight: bold;
            color: #f39c12;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo-area">🐝 WorkBee</div>
            <ul class="nav-links">
                <li><a href="client-dashboard.html">Dashboard</a></li>
                <li><a href="post-job.html">Post a Job</a></li>
                <li><a href="my-jobs.html" class="active">My Posted Jobs</a></li>
                <li><a href="proposals.html">Proposals</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </div>
        <div>
            <ul class="nav-links">
                <li><a href="login.html" style="color: #e74c3c;">Logout</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <h1 class="header-title">My Posted Jobs</h1>
        <div id="jobsListContainer">
            <!-- Jobs will load here -->
        </div>
    </div>

    <script>
        const container = document.getElementById('jobsListContainer');
        const savedJobs = JSON.parse(localStorage.getItem('postedJobs')) || [];

        if (savedJobs.length === 0) {
            container.innerHTML = '<p style="color: #666;">Aapne abhi tak koi job post nahi ki.</p>';
        } else {
            savedJobs.forEach(job => {
                container.innerHTML += `
                    <div class="job-card">
                        <div class="job-info">
                            <h3>${job.title}</h3>
                            <p>${job.description}</p>
                            <small style="color: #999;">Category: ${job.category} | Date: ${job.date}</small>
                        </div>
                        <div class="job-budget">$${job.budget}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
