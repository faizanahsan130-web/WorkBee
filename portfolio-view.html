<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Freelancer Portfolio | WorkBee</title>

    <link rel="stylesheet" href="Css folder/portfolio-view.css">

</head>

<body>

<div class="container">

    <!-- Profile Header -->

    <div class="profile-header">

        <img
            id="profileImage"
            src="https://via.placeholder.com/150"
            alt="Profile">

        <div>

            <h1 id="freelancerName">

                Freelancer Name

            </h1>

            <p id="freelancerTitle">

                Full Stack Developer

            </p>

            <p>

                ⭐ <span id="rating">5.0</span>

                | 📍 <span id="country">Pakistan</span>

            </p>

        </div>

    </div>

    <!-- About -->

    <div class="card">

        <h2>About</h2>

        <p id="about">

            Loading...

        </p>

    </div>

    <!-- Skills -->

    <div class="card">

        <h2>Skills</h2>

        <div id="skillsContainer">

        </div>

    </div>

    <!-- Portfolio -->

    <div class="card">

        <h2>Portfolio Projects</h2>

        <div id="portfolioContainer">

            Loading...

        </div>

    </div>

    <!-- Reviews -->

    <div class="card">

        <h2>Client Reviews</h2>

        <div id="reviewsContainer">

            Loading...

        </div>

    </div>

    <!-- Actions -->

    <div class="actions">

        <button id="hireBtn">

            💼 Hire Freelancer

        </button>

        <button id="chatBtn">

            💬 Chat

        </button>

        <button id="shareBtn">

            🔗 Share

        </button>

    </div>

</div>

<script type="module" src="Js folder/portfolio-view.js"></script>

</body>

</html>
