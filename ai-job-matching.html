<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Job Matching | WorkBee</title>

    <link rel="stylesheet" href="Css folder/ai-job-matching.css">

</head>

<body>

<div class="container">

    <h1>🤖 AI Job Matching</h1>

    <p>Find projects that best match your skills.</p>

    <div class="toolbar">

        <input
            type="text"
            id="searchJob"
            placeholder="Search project..."
        >

        <select id="categoryFilter">

            <option value="All">All Categories</option>
            <option value="Web Development">Web Development</option>
            <option value="Graphic Design">Graphic Design</option>
            <option value="AI">AI</option>
            <option value="Automation">Automation</option>
            <option value="Mobile App">Mobile App</option>
            <option value="Digital Marketing">Digital Marketing</option>

        </select>

    </div>

    <div id="jobsContainer">

        Loading AI Recommendations...

    </div>

</div>

<script type="module" src="Js folder/ai-job-matching.js"></script>

</body>

</html>
