<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - WorkBee</title>
    <link rel="stylesheet" href="Css%20folder/signup.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-logo">
            <a href="browse-gigs.html">🐝 WorkBee</a>
        </div>
        <h2>Create Your Account</h2>
        <p class="auth-subtitle">Join our freelance marketplace today</p>

        <form class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer-links">
            <p>Already have an account? <a href="login.html">Login</a></p>
            <a href="browse-gigs.html">← Back to Home</a>
        </div>
    </div>

</body>
</html>
