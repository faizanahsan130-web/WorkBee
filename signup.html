<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - WorkBee</title>

    <link rel="stylesheet" href="Css folder/signup.css">
</head>
<body>

<div class="signup-container">

    <div class="signup-box">

        <h1>🐝 WorkBee</h1>
        <h2>Create Your Account</h2>

        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <p>
            <a href="index.html">⬅ Back to Home</a>
        </p>

    </div>

</div>

<script type="module" src="Js folder/signup.js"></script>

</body>
</html>
