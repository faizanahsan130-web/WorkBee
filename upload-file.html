<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Files | WorkBee</title>

<link rel="stylesheet" href="Css folder/upload-file.css">

</head>

<body>

<div class="container">

<h1>📁 Upload Portfolio / Project Files</h1>

<form id="uploadForm">

<label>Select File</label>

<input
type="file"
id="file"
required
>

<label>File Type</label>

<select id="type">

<option value="Portfolio">Portfolio</option>

<option value="Project">Project Attachment</option>

<option value="Resume">Resume</option>

<option value="Certificate">Certificate</option>

</select>

<button type="submit">

⬆ Upload File

</button>

</form>

<div id="progressBox">

<p id="progressText"></p>

</div>

<hr>

<h2>Your Uploaded Files</h2>

<div id="filesContainer">

Loading...

</div>

</div>

<script type="module"
src="Js folder/upload-file.js"></script>

</body>

</html>
