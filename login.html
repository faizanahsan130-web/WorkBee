<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkBee</title>

    <link rel="stylesheet" href="Css folder/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>🐝 WorkBee</h1>
        <h2>Welcome Back</h2>
        <p>Login to your account</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="signup-link">
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </p>

        <p>
            <a href="index.html">⬅ Back to Home</a>
        </p>

    </div>

</div>

<script type="module" src="Js folder/login.js"></script>

</body>
</html>
