<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apply Project | WorkBee</title>

    <link rel="stylesheet" href="Css folder/apply-project.css">

</head>

<body>

<div class="container">

    <div class="apply-box">

        <h1>🐝 WorkBee</h1>

        <h2>Apply For Project</h2>

        <form id="applyForm">

            <label>Project Title</label>

            <input
                type="text"
                id="projectTitle"
                readonly
            >

            <label>Your Proposal</label>

            <textarea
                id="proposal"
                rows="6"
                placeholder="Write your proposal..."
                required
            ></textarea>

            <label>Your Bid ($)</label>

            <input
                type="number"
                id="bid"
                placeholder="Enter your bid"
                required
            >

            <label>Delivery Time (Days)</label>

            <input
                type="number"
                id="delivery"
                placeholder="Delivery Days"
                required
            >

            <button type="submit">

                🚀 Submit Application

            </button>

        </form>

        <br>

        <a href="browse-freelancers.html">

            ⬅ Back to Browse Projects

        </a>

    </div>

</div>

<script type="module" src="Js folder/apply-project.js"></script>

</body>

</html>
